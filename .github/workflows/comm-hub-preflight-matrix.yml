name: Comm Hub — Preflight Verification Matrix

# Phase 4B3 — Checkpoint 2B.
#
# Manual-dispatch only. Runs against an APPROVED test/staging database via a
# GitHub Environment ("comm-hub-preflight-<env>") whose reviewers must approve
# each run. The DB URL secret is scoped to that environment.
#
# Never runs on push/PR. Never runs against production. The secret value is
# not written to any file and is never echoed. Item F: DATABASE_URL is
# exported for the DB-backed readiness/service tests, and a skipped run is
# treated as workflow failure.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target non-production environment'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - staging

concurrency:
  group: comm-hub-preflight-matrix-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  preflight-matrix:
    name: Preflight Verification Matrix (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: comm-hub-preflight-${{ github.event.inputs.environment }}

    env:
      COMM_HUB_TEST_ENVIRONMENT: ${{ github.event.inputs.environment }}

    steps:
      - name: Refuse production input
        run: |
          case "${{ github.event.inputs.environment }}" in
            test|staging) ;;
            *) echo "environment must be test or staging" >&2; exit 1 ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql --version

      - name: Pre-dispatch static lint
        run: bash scripts/comm-hub/pre-dispatch-static-lint.sh

      - name: TypeScript contract tests
        run: |
          bunx vitest run \
            src/platform/communication-hub/__tests__/dryRunPreflightService.test.ts \
            --reporter=verbose \
            2>&1 | tee /tmp/ts-contract-tests.log

      # Item F: the readiness harness uses DATABASE_URL / PGHOST to enter its
      # runIf branch. Without it the whole suite would silently skip. We
      # export the same secret and then require the JSON summary to show
      # skipped=0.
      - name: Service / readiness tests
        env:
          DATABASE_URL: ${{ secrets.COMM_HUB_TEST_DB_URL }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "secret COMM_HUB_TEST_DB_URL not configured for this environment — cannot run readiness tests" >&2
            exit 1
          fi
          bunx vitest run \
            src/__tests__/comm-hub/readinessReadOnly.test.ts \
            --reporter=verbose --reporter=json --outputFile=/tmp/readiness-summary.json \
            2>&1 | tee /tmp/service-tests.log
          # Fail if any test was skipped in an environment expected to have DB access.
          SKIPPED=$(node -e "const j=require('/tmp/readiness-summary.json');console.log(j.numPendingTests||0)")
          PASSED=$(node -e "const j=require('/tmp/readiness-summary.json');console.log(j.numPassedTests||0)")
          FAILED=$(node -e "const j=require('/tmp/readiness-summary.json');console.log(j.numFailedTests||0)")
          echo "Readiness results: passed=${PASSED} failed=${FAILED} skipped=${SKIPPED}"
          if [ "${SKIPPED}" != "0" ] || [ "${FAILED}" != "0" ]; then
            echo "Expected 0 failed / 0 skipped readiness tests in a DB-enabled environment." >&2
            exit 1
          fi

      - name: Preflight Verification Matrix (SQL, service-role)
        env:
          COMM_HUB_TEST_DB_URL: ${{ secrets.COMM_HUB_TEST_DB_URL }}
        run: |
          if [ -z "${COMM_HUB_TEST_DB_URL:-}" ]; then
            echo "secret COMM_HUB_TEST_DB_URL not configured for this environment" >&2
            exit 1
          fi
          bun run test:comm-hub-preflight-matrix 2>&1 | tee /tmp/preflight-matrix.log

      - name: Sanitize logs before upload
        if: always()
        run: |
          for f in /tmp/ts-contract-tests.log /tmp/service-tests.log /tmp/preflight-matrix.log; do
            if [ -f "$f" ]; then
              sed -i -E 's#postgres(ql)?://[^ ]*#postgres://<redacted>#g' "$f"
            fi
          done

      - name: Upload sanitized test-result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comm-hub-preflight-matrix-${{ github.event.inputs.environment }}
          path: |
            /tmp/ts-contract-tests.log
            /tmp/service-tests.log
            /tmp/preflight-matrix.log
            /tmp/readiness-summary.json
          retention-days: 30
          if-no-files-found: warn
